<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeracy Assessment Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Numeracy Assessment Tool</h1>
    </header>
    <main>
        <section id="student-management">
            <h2>Manage Students</h2>
            <div id="student-list">
                <h3>Existing Students</h3>
                <ul>
                    {% for student in students %}
                        <li>{{ student.name }} - Grade {{ student.grade }}</li>
                    {% else %}
                        <li>No students found.</li>
                    {% endfor %}
                </ul>
            </div>
            <div id="add-student">
                <h3>Add a New Student</h3>
                <form action="{{ url_for('add_student') }}" method="post">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="grade">Grade:</label>
                        <input type="number" id="grade" name="grade" required>
                    </div>
                    <button type="submit">Add Student</button>
                </form>
            </div>
        </section>

        <section id="assessment-setup">
            <h2>Start a New Assessment</h2>
            <form id="assessment-form" action="{{ url_for('start_assessment') }}" method="post">
                <div class="form-group">
                    <label for="student-select">Select Student:</label>
                    <select id="student-select" name="student" {% if not students %}disabled{% endif %}>
                        {% for student in students %}
                            <option value="{{ student.id }}">{{ student.name }}</option>
                        {% else %}
                            <option>Please add a student first</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="topic-select">Select Topic:</label>
                    <select id="topic-select" name="topic">
                        {% for topic in topics %}
                            <option value="{{ topic.topic }}">{{ topic.topic }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" {% if not students %}disabled{% endif %}>Start Assessment</button>
            </form>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>

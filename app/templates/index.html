<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numeracy Assessment Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>Numeracy Assessment Tool</h1>
    </header>
    <main>
        <section id="assessment-setup">
            <h2>Start a New Assessment</h2>
            <form id="assessment-form">
                <div class="form-group">
                    <label for="student-select">Select Student:</label>
                    <select id="student-select" name="student">
                        <option value="1">Student A</option>
                        <option value="2">Student B</option>
                        <option value="3">Student C</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="topic-select">Select Topic:</label>
                    <select id="topic-select" name="topic">
                        <option value="1">Numbers up to 20</option>
                        <option value="2">Addition & Subtraction within 20</option>
                        <option value="3">Place Value</option>
                    </select>
                </div>
                <button type="submit">Start Assessment</button>
            </form>
        </section>
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
